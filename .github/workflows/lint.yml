name: Lint

on:
  schedule:
    - cron: '0 9 * * *' # Daily at 9am UTC
  pull_request:
    branches: [main]
    paths:
      - 'packages/*/src/**'
      - 'apps/*/src/**'
      - 'apps/*/app/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - run: bun install

      - name: Run lint (affected packages only)
        id: lint
        run: |
          set -o pipefail
          bunx turbo lint typecheck --affected 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Generate GitHub App token
        if: steps.lint.outcome == 'failure' && github.event_name != 'pull_request'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Fail check on PR
        if: steps.lint.outcome == 'failure' && github.event_name == 'pull_request'
        run: exit 1

      - name: Create issue if lint failed
        if: steps.lint.outcome == 'failure' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Detect affected app from output
          APP=$(grep -oE 'apps/[a-zA-Z0-9_-]+' lint-output.txt | head -1 | cut -d'/' -f2)
          LABEL="domain:${APP:-unknown}"
          TITLE="Lint: errors detected in ${APP:-project}"

          # Check if open issue already exists
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number -q '.[0].number')

          if [ -z "$EXISTING" ]; then
            gh label create "$LABEL" --description "Domain: $APP" --color "d73a4a" 2>/dev/null || true
            gh label create "claude" --description "Triggers Claude assistant" --color "7c3aed" 2>/dev/null || true
            gh issue create \
              --title "$TITLE" \
              --label "$LABEL" \
              --label "claude" \
              --body "$(cat <<EOF
          ## Lint Failed

          \`\`\`
          $(cat lint-output.txt)
          \`\`\`

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )"
          else
            # Check if there's pending work from Claude (branch or PR)
            CLAUDE_BRANCH=$(git ls-remote --heads origin "claude/issue-${EXISTING}-*" 2>/dev/null | head -1)
            PENDING_PR=$(gh pr list --state open --json number,body -q ".[] | select(.body | contains(\"#${EXISTING}\")) | .number" | head -1)

            if [ -n "$CLAUDE_BRANCH" ]; then
              BRANCH_NAME=$(echo "$CLAUDE_BRANCH" | awk '{print $2}' | sed 's|refs/heads/||')

              if [ -z "$PENDING_PR" ]; then
                # Branch exists but no PR → create PR
                gh pr create \
                  --head "$BRANCH_NAME" \
                  --title "fix: lint errors in ${APP:-project} (#${EXISTING})" \
                  --body "Closes #${EXISTING} - Auto-generated from Claude's fix. [synerbot](https://github.com/apps/synerbot)"
                gh issue comment "$EXISTING" --body "PR created from Claude's branch \`$BRANCH_NAME\`. Awaiting review."
              else
                # Branch and PR exist → just notify
                gh issue comment "$EXISTING" --body "Still failing. PR #${PENDING_PR} awaiting review. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              fi
            else
              # No pending work, invoke Claude
              gh issue comment "$EXISTING" --body "@claude Still failing. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            fi
          fi
