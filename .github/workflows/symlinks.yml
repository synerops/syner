name: Symlinks

on:
  schedule:
    - cron: '0 21 * * *'  # Daily at 9pm UTC (4pm EST / 5pm COL)
  workflow_dispatch:

jobs:
  check-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Configure git with App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "synerbot[bot]"
          git config user.email "synerbot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Check and fix symlinks
        id: fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Check skill symlinks and fix any issues:

            1. First, read skills/syner/skills-architecture.md to understand the architecture
            2. Run /syner-fix-symlinks to check for issues
            3. If issues found, run /syner-fix-symlinks --fix to repair them
            4. If fixes were made, commit with message: "fix(skills): repair symlinks"
            5. Write final status to .syner/reports/symlinks.md:
               - ## Status: ok | fixed | error
               - ## Changes: list of what was fixed (or "None")
          claude_args: |
            --max-turns 20
            --allowedTools Bash,Glob,Read,Write

      - name: Push and create PR if changes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p .syner/reports
          REPORT=".syner/reports/symlinks.md"

          # Check if there are uncommitted changes
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes found, committing..."
            git add -A
            git commit -m "fix(skills): repair symlinks"
          fi

          # Check if we have commits ahead of origin/main
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "✓ No changes needed"

            # Close existing issue if any
            EXISTING=$(gh issue list --state open --label symlinks --json number --jq '.[0].number')
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" --comment "✓ All symlinks valid. Closing."
            fi
            exit 0
          fi

          # Create branch and push
          BRANCH="fix/symlinks-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

          # Create PR
          PR_URL=$(gh pr create \
            --title "fix(skills): repair symlinks" \
            --body "## Summary
          Automated symlink repairs detected and fixed by the daily check.

          ## Changes
          $(cat "$REPORT" 2>/dev/null || echo 'See commits for details')

          ---
          Generated by [symlinks workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --base main \
            --head "$BRANCH")

          echo "PR created: $PR_URL"

          # Close existing issue if any
          EXISTING=$(gh issue list --state open --label symlinks --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "Fixed in $PR_URL"
          fi
