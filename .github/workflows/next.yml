name: Next

on:
  pull_request:
    types: [closed]

jobs:
  next:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Continue autonomous loop
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Look for "Fixes #XX" pattern (auto-PR format)
            const match = body.match(/Fixes #(\d+)/i);

            if (!match) {
              console.log('No issue reference found (expected "Fixes #XX")');
              return;
            }

            const issueNumber = parseInt(match[1]);
            console.log(`Found issue: #${issueNumber}`);

            // Get the issue
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            if (issue.state !== 'open') {
              console.log(`Issue #${issueNumber} is ${issue.state}, skipping`);
              return;
            }

            const labels = issue.labels.map(l => l.name);
            const isTracked = labels.includes('standup') || labels.includes('skill-review');

            if (!isTracked) {
              console.log(`Issue #${issueNumber} is not a tracked issue, skipping`);
              return;
            }

            // Check if there are unchecked items in the acceptance criteria
            const hasUncheckedItems = issue.body && issue.body.includes('- [ ]');

            if (!hasUncheckedItems) {
              console.log(`No unchecked items in #${issueNumber}, closing issue`);

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ All acceptance criteria completed. Closing issue.`
              });

              return;
            }

            // More items to do - re-trigger execution
            console.log(`Unchecked items remain in #${issueNumber}, continuing loop`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['claude']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ PR #${context.payload.pull_request.number} merged. Continuing with next item.`
            });

            console.log(`Re-triggered execution on #${issueNumber}`);
