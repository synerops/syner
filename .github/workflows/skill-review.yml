name: Skill Review

on:
  schedule:
    - cron: '0 0,8,16 * * *'  # Every 8 hours: 12am, 8am, 4pm UTC
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Run skill review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /syner-skill-reviewer (no argument = batch mode).
            Write the report to reports/skill-review.md
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Glob

      - name: Check for findings
        id: check
        run: |
          REPORT="reports/skill-review.md"
          if [ ! -f "$REPORT" ]; then
            echo "has_findings=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if grep -q "### @claude" "$REPORT"; then
            echo "has_findings=true" >> $GITHUB_OUTPUT
          else
            echo "has_findings=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate plan from findings
        if: steps.check.outputs.has_findings == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read reports/skill-review.md and transform the @claude findings into a plan.
            Write JSON to .syner/plan.json with format:
            {"status":"planned","items":[{"id":"X","title":"...","target":["path"],"context":"...","action":"...","verify":"...","priority":1}]}
          claude_args: |
            --agent syner-planner
            --max-turns 10
            --allowedTools Read,Write

      - name: Create issues from plan
        if: steps.check.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PLAN_FILE=".syner/plan.json"

          if [ ! -f "$PLAN_FILE" ]; then
            echo "No plan file found, skipping issue creation"
            exit 0
          fi

          PLAN=$(cat "$PLAN_FILE")
          STATUS=$(echo "$PLAN" | jq -r '.status')

          if [ "$STATUS" != "planned" ]; then
            echo "Plan status: $STATUS (not 'planned'), skipping"
            exit 0
          fi

          # Ensure labels exist
          gh label create "planned" --description "Planned for execution" --color "c2e0c6" 2>/dev/null || true
          gh label create "skill-review" --description "Skill ecosystem review" --color "0e8a16" 2>/dev/null || true

          # Create an issue for each plan item
          ITEMS=$(echo "$PLAN" | jq -c '.items[]')

          while IFS= read -r ITEM; do
            ID=$(echo "$ITEM" | jq -r '.id')
            TITLE=$(echo "$ITEM" | jq -r '.title')
            TARGET=$(echo "$ITEM" | jq -r '.target | join(", ")')
            CONTEXT=$(echo "$ITEM" | jq -r '.context')
            ACTION=$(echo "$ITEM" | jq -r '.action')
            VERIFY=$(echo "$ITEM" | jq -r '.verify')

            # Check if issue already exists
            EXISTING=$(gh issue list --state open --label planned --search "[$ID] in:title" --json number --jq '.[0].number')

            if [ -n "$EXISTING" ]; then
              echo "Issue for $ID already exists (#$EXISTING), skipping"
              continue
            fi

            echo "Creating issue for $ID: $TITLE"

            BODY=$(printf '## Target\n%s\n\n## Context\n%s\n\n## Action\n%s\n\n## Verify\n%s\n\n---\n_Generated from skill-review plan_' "$TARGET" "$CONTEXT" "$ACTION" "$VERIFY")

            gh issue create \
              --title "[$ID] $TITLE" \
              --label "planned" \
              --label "skill-review" \
              --body "$BODY"
          done <<< "$ITEMS"

          echo "Done creating issues from plan"

      - name: Update tracking issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPORT="reports/skill-review.md"
          TITLE="Skill Review: inconsistencies detected"

          if [ ! -f "$REPORT" ]; then
            echo "No report found, skipping"
            exit 0
          fi

          HAS_FINDINGS="${{ steps.check.outputs.has_findings }}"

          # Check for existing open tracking issue
          EXISTING=$(gh issue list --state open --label skill-review --search "$TITLE in:title" --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            if [ "$HAS_FINDINGS" = "true" ]; then
              echo "Creating tracking issue..."
              gh issue create \
                --title "$TITLE" \
                --label "skill-review" \
                --body-file "$REPORT"
            else
              echo "No findings. All clean."
            fi
          else
            echo "Found existing tracking issue #$EXISTING"
            gh issue edit "$EXISTING" --body-file "$REPORT"

            if [ "$HAS_FINDINGS" = "false" ]; then
              echo "No more findings, closing tracking issue..."
              gh issue close "$EXISTING" --comment "All inconsistencies resolved. Closing."
            fi
          fi
