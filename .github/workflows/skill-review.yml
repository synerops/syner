name: Skill Review

# TODO: Implement skill cache when:
# - skills > 100, or
# - execution > 15 min
# See: .syner/analysis/skill-review-refactor.md

on:
  # Schedule disabled during refactor - will be 1x/day when re-enabled
  # schedule:
  #   - cron: '0 14 * * *'  # 1x/day, 9am EST
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Run skill review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /syner-skill-reviewer (no argument = batch mode).
            Write the report to reports/skill-review.md

            The report groups findings by pattern: FIXEABLE vs NEEDS_DECISION.
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Glob

      - name: Check for findings
        id: check
        run: |
          REPORT="reports/skill-review.md"
          if [ ! -f "$REPORT" ]; then
            echo "has_fixeable=false" >> $GITHUB_OUTPUT
            echo "has_needs_decision=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if grep -q "### FIXEABLE" "$REPORT"; then
            echo "has_fixeable=true" >> $GITHUB_OUTPUT
          else
            echo "has_fixeable=false" >> $GITHUB_OUTPUT
          fi

          if grep -q "### NEEDS_DECISION" "$REPORT"; then
            echo "has_needs_decision=true" >> $GITHUB_OUTPUT
          else
            echo "has_needs_decision=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply fixes and create PR
        if: steps.check.outputs.has_fixeable == 'true'
        id: fix
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read reports/skill-review.md and apply all fixes from the FIXEABLE section.

            For each pattern in FIXEABLE:
            1. Apply the described fix to ALL affected skills listed
            2. Stage the changes with git add

            After all fixes applied:
            1. Create branch: skill-review/fixes-$(date +%Y%m%d)
            2. Commit: "fix(skills): apply skill review fixes"
            3. Push and create PR:
               - Title: "fix(skills): [CODES] - N skills fixed"
               - Body: Summary of patterns and affected skills
               - Label: skill-review

            After PR is created, add a comment with reproducible prompts:

            ## Reproducible Prompts

            For each pattern, include the exact prompt that would reproduce the fix.
            This allows reviewing the logic and re-running manually if needed.
          claude_args: |
            --max-turns 25
            --allowedTools Read,Write,Edit,Glob,Bash

      - name: Create issues for decisions
        if: steps.check.outputs.has_needs_decision == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPORT="reports/skill-review.md"

          # Ensure labels exist
          gh label create "skill-review" --description "Skill ecosystem review" --color "0e8a16" 2>/dev/null || true
          gh label create "needs-decision" --description "Requires human decision" --color "d93f0b" 2>/dev/null || true

          # Extract NEEDS_DECISION patterns and create one issue per pattern
          # Pattern lines look like: #### [B4] Input Handling — 2 skills affected
          awk '/^### NEEDS_DECISION/,/^### Summary/' "$REPORT" | grep -E "^#### \[" | while read -r LINE; do
            CODE=$(echo "$LINE" | grep -oE '\[[A-Z][0-9]+\]')
            TITLE=$(echo "$LINE" | sed 's/^#### //')

            # Skip if issue already exists
            EXISTING=$(gh issue list --state open --label needs-decision --search "$CODE in:title" --json number --jq '.[0].number')
            if [ -n "$EXISTING" ]; then
              echo "Issue for $CODE exists (#$EXISTING), skipping"
              continue
            fi

            # Extract section for this pattern
            BODY=$(awk "/^#### \\$CODE/,/^####/" "$REPORT" | head -n -1)

            echo "Creating issue: $TITLE"
            gh issue create \
              --title "$TITLE" \
              --label "skill-review" \
              --label "needs-decision" \
              --assignee "rbadillap" \
              --body "$BODY"
          done

      - name: Update status
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HAS_FIXEABLE="${{ steps.check.outputs.has_fixeable }}"
          HAS_NEEDS_DECISION="${{ steps.check.outputs.has_needs_decision }}"

          if [ "$HAS_FIXEABLE" = "false" ] && [ "$HAS_NEEDS_DECISION" = "false" ]; then
            echo "✅ All skills clean - no issues found"
          else
            echo "📋 Review complete:"
            [ "$HAS_FIXEABLE" = "true" ] && echo "  - PR created for fixeable patterns"
            [ "$HAS_NEEDS_DECISION" = "true" ] && echo "  - Issues created for decisions needed"
          fi
