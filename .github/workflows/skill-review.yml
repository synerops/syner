name: Skill Review

# TODO: Implement skill cache when:
# - skills > 100, or
# - execution > 15 min
# See: .syner/analysis/skill-review-refactor.md

on:
  # Testing: 3x/day to observe behavior. Change to 1x/day after validation.
  schedule:
    - cron: '0 0,8,16 * * *'  # 3x/day: 12am, 8am, 4pm UTC
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Prepare directories
        run: mkdir -p .syner/reports

      - name: Run skill review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /syner-skill-reviewer (no argument = batch mode).
            Write the report to .syner/reports/skill-review.md

            The report groups findings by pattern: FIXEABLE vs NEEDS_DECISION.
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Glob

      - name: Check for findings
        id: check
        run: |
          REPORT=".syner/reports/skill-review.md"
          if [ ! -f "$REPORT" ]; then
            echo "has_fixeable=false" >> $GITHUB_OUTPUT
            echo "has_needs_decision=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if grep -q "## FIXEABLE" "$REPORT"; then
            echo "has_fixeable=true" >> $GITHUB_OUTPUT
          else
            echo "has_fixeable=false" >> $GITHUB_OUTPUT
          fi

          if grep -q "## NEEDS_DECISION" "$REPORT"; then
            echo "has_needs_decision=true" >> $GITHUB_OUTPUT
          else
            echo "has_needs_decision=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply fixes
        if: steps.check.outputs.has_fixeable == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read .syner/reports/skill-review.md and apply all fixes from the FIXEABLE section.

            1. Create branch: skill-review/fixes-$(date +%Y%m%d)
            2. For each pattern in FIXEABLE, apply the fix to ALL affected skills
            3. Commit with: fix(skills): <brief description>
            4. Push the branch

            After pushing, write two files:

            .syner/reports/skill-review-pr-title.txt
            Just the PR title (conventional commit format, same as commit message)

            .syner/reports/skill-review-pr-body.md
            ## Summary
            What was fixed and which skills were affected.

            ## Reproducible Prompts
            ### [Pattern Name]
            Instructions as plain text.
            ```markdown
            Content to copy-paste.
            ```

            Do NOT create the PR.
          claude_args: |
            --max-turns 20
            --allowedTools Read,Write,Edit,Glob,Bash

      - name: Create PR
        if: steps.check.outputs.has_fixeable == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH=$(git branch --show-current)

          if [ "$BRANCH" == "main" ]; then
            echo "Still on main, no changes were made"
            exit 0
          fi

          TITLE=$(cat .syner/reports/skill-review-pr-title.txt)
          BODY=$(cat .syner/reports/skill-review-pr-body.md)

          gh label create "skill-review" --color "0e8a16" 2>/dev/null || true
          gh pr create --title "$TITLE" --label "skill-review" --body "$BODY"

      - name: Create issues for decisions
        if: steps.check.outputs.has_needs_decision == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPORT=".syner/reports/skill-review.md"

          # Ensure labels exist
          gh label create "skill-review" --description "Skill ecosystem review" --color "0e8a16" 2>/dev/null || true
          gh label create "needs-decision" --description "Requires human decision" --color "d93f0b" 2>/dev/null || true

          # Extract NEEDS_DECISION patterns and create one issue per pattern
          # Pattern lines look like: #### [B4] Input Handling — 2 skills affected
          awk '/^## NEEDS_DECISION/,/^## Summary/' "$REPORT" | grep -E "^#### \[" | while read -r LINE; do
            CODE=$(echo "$LINE" | grep -oE '\[[A-Z][0-9]+\]')
            TITLE=$(echo "$LINE" | sed 's/^#### //')

            # Skip if issue already exists
            EXISTING=$(gh issue list --state open --label needs-decision --search "$CODE in:title" --json number --jq '.[0].number')
            if [ -n "$EXISTING" ]; then
              echo "Issue for $CODE exists (#$EXISTING), skipping"
              continue
            fi

            # Extract section for this pattern
            BODY=$(awk "/^#### \\$CODE/,/^####/" "$REPORT" | head -n -1)

            echo "Creating issue: $TITLE"
            gh issue create \
              --title "$TITLE" \
              --label "skill-review" \
              --label "needs-decision" \
              --assignee "rbadillap" \
              --body "$BODY"
          done

      - name: Update status
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HAS_FIXEABLE="${{ steps.check.outputs.has_fixeable }}"
          HAS_NEEDS_DECISION="${{ steps.check.outputs.has_needs_decision }}"

          if [ "$HAS_FIXEABLE" = "false" ] && [ "$HAS_NEEDS_DECISION" = "false" ]; then
            echo "✅ All skills clean - no issues found"
          else
            echo "📋 Review complete:"
            [ "$HAS_FIXEABLE" = "true" ] && echo "  - PR created for fixeable patterns"
            [ "$HAS_NEEDS_DECISION" = "true" ] && echo "  - Issues created for decisions needed"
          fi
