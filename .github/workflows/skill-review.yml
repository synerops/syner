name: Skill Review

# TODO: Implement skill cache when:
# - skills > 100, or
# - execution > 15 min
# See: .syner/analysis/skill-review-refactor.md

on:
  # Testing: 3x/day to observe behavior. Change to 1x/day after validation.
  schedule:
    - cron: '0 0,8,16 * * *'  # 3x/day: 12am, 8am, 4pm UTC
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      has_fixeable: ${{ steps.check.outputs.has_fixeable }}
      has_needs_decision: ${{ steps.check.outputs.has_needs_decision }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare directories
        run: mkdir -p .syner/reports

      - name: Run skill review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /syner-skill-reviewer (no argument = batch mode).
            Write the report to .syner/reports/skill-review.md

            The report groups findings by pattern - FIXEABLE vs NEEDS_DECISION.
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Glob

      - name: Check for findings
        id: check
        run: |
          REPORT=".syner/reports/skill-review.md"
          if [ ! -f "$REPORT" ]; then
            echo "has_fixeable=false" >> $GITHUB_OUTPUT
            echo "has_needs_decision=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if grep -q "## FIXEABLE" "$REPORT"; then
            echo "has_fixeable=true" >> $GITHUB_OUTPUT
          else
            echo "has_fixeable=false" >> $GITHUB_OUTPUT
          fi

          if grep -q "## NEEDS_DECISION" "$REPORT"; then
            echo "has_needs_decision=true" >> $GITHUB_OUTPUT
          else
            echo "has_needs_decision=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: skill-review-report
          path: .syner/reports/skill-review.md
          retention-days: 7

  fix:
    needs: review
    if: needs.review.outputs.has_fixeable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      branch_name: ${{ steps.apply.outputs.branch_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: skill-review-report
          path: .syner/reports

      - name: Apply fixes
        id: apply
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          branch_name_template: "syner/skill-review-{{timestamp}}"
          prompt: |
            Read .syner/reports/skill-review.md

            Apply all fixes from the FIXEABLE section to the affected skills.

            After applying fixes, create the PR metadata

            .syner/reports/skill-review-pr-title.txt
            One line, conventional commit format.

            .syner/reports/skill-review-pr-body.md
            Summary of changes + reproducible prompts for each pattern.
          claude_args: |
            --max-turns 50
            --allowedTools Read,Write,Edit,Glob,Bash

      - name: Upload PR metadata
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: |
            .syner/reports/skill-review-pr-title.txt
            .syner/reports/skill-review-pr-body.md
          retention-days: 7

  pr:
    needs: fix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Download PR metadata
        uses: actions/download-artifact@v4
        with:
          name: pr-metadata
          path: .syner/reports

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ needs.fix.outputs.branch_name }}"

          if [ -z "$BRANCH" ]; then
            echo "No branch from fix job"
            exit 1
          fi

          TITLE=$(cat .syner/reports/skill-review-pr-title.txt)
          BODY=$(cat .syner/reports/skill-review-pr-body.md)

          gh label create "skill-review" --color "0e8a16" 2>/dev/null || true
          gh pr create \
            --title "$TITLE" \
            --label "skill-review" \
            --body "$BODY" \
            --head "$BRANCH"

  issues:
    needs: review
    if: needs.review.outputs.has_needs_decision == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: skill-review-report
          path: .syner/reports

      - name: Create issues for decisions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPORT=".syner/reports/skill-review.md"

          gh label create "skill-review" --description "Skill ecosystem review" --color "0e8a16" 2>/dev/null || true
          gh label create "needs-decision" --description "Requires human decision" --color "d93f0b" 2>/dev/null || true

          awk '/^## NEEDS_DECISION/,/^## Summary/' "$REPORT" | grep -E "^### \[" | while read -r LINE; do
            CODE=$(echo "$LINE" | grep -oE '\[[A-Z][0-9]+\]')
            TITLE=$(echo "$LINE" | sed 's/^### //')

            EXISTING=$(gh issue list --state open --label needs-decision --search "$CODE in:title" --json number --jq '.[0].number')
            if [ -n "$EXISTING" ]; then
              echo "Issue for $CODE exists (#$EXISTING), skipping"
              continue
            fi

            BODY=$(awk "/^### \\$CODE/,/^###/" "$REPORT" | head -n -1)

            echo "Creating issue: $TITLE"
            gh issue create \
              --title "$TITLE" \
              --label "skill-review" \
              --label "needs-decision" \
              --assignee "rbadillap" \
              --body "$BODY"
          done
