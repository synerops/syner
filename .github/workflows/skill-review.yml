name: Skill Review

on:
  schedule:
    - cron: '0 0,8,16 * * *'  # Every 8 hours: 12am, 8am, 4pm UTC
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Run skill review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /syner-skill-reviewer (no argument = batch mode).
            Write the report to reports/skill-review.md
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Glob

      - name: Handle review results
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPORT="reports/skill-review.md"
          TITLE="Skill Review: inconsistencies detected"

          # Exit if no report
          if [ ! -f "$REPORT" ]; then
            echo "No report found, skipping"
            exit 0
          fi

          # Check if report has actionable findings
          HAS_FINDINGS=false
          if grep -q "### @claude" "$REPORT"; then
            HAS_FINDINGS=true
          fi

          # Ensure labels exist
          gh label create "skill-review" --description "Skill ecosystem review" --color "0e8a16" 2>/dev/null || true
          gh label create "needs-planning" --description "Needs planning before execution" --color "d4a017" 2>/dev/null || true

          # Check for existing open issue
          EXISTING=$(gh issue list --state open --label skill-review --search "$TITLE in:title" --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            # No existing issue
            if [ "$HAS_FINDINGS" = "true" ]; then
              echo "Creating new issue with needs-planning label..."
              gh issue create \
                --title "$TITLE" \
                --label "skill-review" \
                --label "needs-planning" \
                --body-file "$REPORT"
            else
              echo "No findings. All clean."
            fi
          else
            echo "Found existing issue #$EXISTING"

            # Update issue body with latest report
            gh issue edit "$EXISTING" --body-file "$REPORT"

            if [ "$HAS_FINDINGS" = "false" ]; then
              echo "No more findings, closing issue..."
              gh issue close "$EXISTING" --comment "All inconsistencies resolved. Closing."
            else
              # Ensure needs-planning is set (autonomous loop handles the rest)
              echo "Findings detected, ensuring needs-planning label..."
              gh issue edit "$EXISTING" --add-label "needs-planning" 2>/dev/null || true
            fi
          fi
