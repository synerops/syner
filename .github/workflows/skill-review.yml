name: Skill Review

on:
  schedule:
    - cron: '0 0,8,16 * * *'  # Every 8 hours: 12am, 8am, 4pm UTC
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Run skill review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /syner-skill-reviewer (no argument = batch mode).
            Write the report to reports/skill-review.md
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Glob

      - name: Handle review results
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          REPORT="reports/skill-review.md"
          TITLE="Skill Review: inconsistencies detected"

          # Exit if no report
          if [ ! -f "$REPORT" ]; then
            echo "No report found, skipping"
            exit 0
          fi

          HAS_FINDINGS=false
          if grep -qE "^- \[" "$REPORT" || grep -q "### @claude" "$REPORT"; then
            HAS_FINDINGS=true
          fi

          # Ensure labels exist
          gh label create "skill-review" --description "Skill ecosystem review" --color "0e8a16" 2>/dev/null || true
          gh label create "needs-planning" --description "Needs planning before execution" --color "d4a017" 2>/dev/null || true
          gh label create "claude" --description "Ready for Claude execution" --color "7c3aed" 2>/dev/null || true

          # Check for existing issue
          EXISTING=$(gh issue list --state open --label skill-review --search "$TITLE in:title" --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            # No existing issue
            if [ "$HAS_FINDINGS" = "true" ]; then
              echo "Creating new issue with needs-planning label..."
              gh issue create \
                --title "$TITLE" \
                --label "skill-review" \
                --label "needs-planning" \
                --body-file "$REPORT"
            else
              echo "No findings, no existing issue. All clean."
            fi
          else
            echo "Found existing issue #$EXISTING"

            # Always update issue body with latest report
            echo "Updating issue body with latest report..."
            gh issue edit "$EXISTING" --body-file "$REPORT"

            if [ "$HAS_FINDINGS" = "false" ]; then
              # No more findings - close the issue
              echo "No more findings, closing issue..."
              gh issue close "$EXISTING" --comment "All inconsistencies resolved. Closing."
              exit 0
            fi

            # Check current state
            HAS_PLAN=$(gh issue view "$EXISTING" --json body --jq '.body' | grep -c "## Plan" || true)
            HAS_CLAUDE_LABEL=$(gh issue view "$EXISTING" --json labels --jq '.labels[].name' | grep -c "^claude$" || true)

            if [ "$HAS_PLAN" -gt 0 ] && [ "$HAS_CLAUDE_LABEL" -eq 0 ]; then
              # Has plan but no claude label - add it to continue execution
              echo "Issue has plan, adding claude label to continue..."
              gh issue edit "$EXISTING" --add-label "claude"
            elif [ "$HAS_PLAN" -eq 0 ]; then
              # No plan yet - ensure needs-planning label
              echo "No plan yet, ensuring needs-planning label..."
              gh issue edit "$EXISTING" --add-label "needs-planning"
            fi
          fi
