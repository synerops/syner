name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    runs-on: ubuntu-latest
    # Only run if triggered by @claude mention, assignment, or label
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (github.event.action == 'assigned' || github.event.action == 'labeled'))

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::Missing required secret: ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN"
            echo ""
            echo "To fix this:"
            echo "1. Go to Settings → Secrets and variables → Actions"
            echo "2. Add ANTHROPIC_API_KEY with your API key from https://console.anthropic.com"
            echo ""
            echo "See apps/bot/README.md for more details."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          assignee_trigger: "claude"
          label_trigger: "claude"
          allowed_bots: "synerbot[bot]"
          claude_args: |
            --agent syner
            --max-turns 30
