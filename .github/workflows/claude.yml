name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    runs-on: ubuntu-latest
    # Only run if triggered by @claude mention, assignment, or relevant labels
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && (github.event.label.name == 'claude' || github.event.label.name == 'needs-planning'))

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::Missing required secret: ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN"
            echo ""
            echo "To fix this:"
            echo "1. Go to Settings → Secrets and variables → Actions"
            echo "2. Add ANTHROPIC_API_KEY with your API key from https://console.anthropic.com"
            echo ""
            echo "See apps/bot/README.md for more details."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Determine operation mode
        id: mode
        run: |
          LABEL="${{ github.event.label.name }}"
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          if [ "$EVENT" == "issues" ] && [ "$ACTION" == "labeled" ]; then
            if [ "$LABEL" == "needs-planning" ]; then
              echo "mode=planning" >> $GITHUB_OUTPUT
              echo "prompt=Read .github/prompts/planning.md and follow those instructions." >> $GITHUB_OUTPUT
            elif [ "$LABEL" == "claude" ]; then
              echo "mode=execution" >> $GITHUB_OUTPUT
              echo "prompt=Read .github/prompts/execute-issue.md and follow those instructions." >> $GITHUB_OUTPUT
            else
              echo "mode=interactive" >> $GITHUB_OUTPUT
              echo "prompt=Respond to the labeled issue." >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=interactive" >> $GITHUB_OUTPUT
            echo "prompt=Respond to the user request." >> $GITHUB_OUTPUT
          fi

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          assignee_trigger: "claude"
          label_trigger: "claude,needs-planning"
          allowed_bots: "synerbot[bot]"
          prompt: ${{ steps.mode.outputs.prompt }}
          claude_args: |
            --max-turns 30
            --allowedTools Read,Edit,Write,Bash,Glob,Grep
            --append-system-prompt "GitHub Context: event=${{ github.event_name }}, action=${{ github.event.action }}, repo=${{ github.repository }}, mode=${{ steps.mode.outputs.mode }}"

      - name: Create PR if commits exist
        if: steps.mode.outputs.mode == 'execution'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH=$(git branch --show-current)

          # Skip if still on main
          if [ "$BRANCH" == "main" ]; then
            echo "Still on main branch, no PR needed"
            exit 0
          fi

          # Check if branch has commits ahead of main
          COMMITS=$(git log origin/main.."$BRANCH" --oneline)
          if [ -z "$COMMITS" ]; then
            echo "No commits ahead of main, no PR needed"
            exit 0
          fi

          echo "Branch: $BRANCH"
          echo "Commits:"
          echo "$COMMITS"

          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for this branch"
            exit 0
          fi

          # Get issue number from branch name (claude/issue-XX-...)
          ISSUE_NUMBER=$(echo "$BRANCH" | grep -oP 'issue-\K[0-9]+' || echo "")

          # Build PR body
          FOOTER="Generated by [@synerbot](https://github.com/apps/synerbot)"
          if [ -n "$ISSUE_NUMBER" ]; then
            PR_BODY=$(printf 'Fixes #%s\n\n---\n%s' "$ISSUE_NUMBER" "$FOOTER")
          else
            PR_BODY=$(printf '---\n%s' "$FOOTER")
          fi

          # Create PR
          gh pr create \
            --title "fix: $(git log -1 --format=%s)" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH"

          echo "PR created successfully"

      - name: Cleanup labels
        if: always() && steps.mode.outputs.mode == 'execution'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Get issue number from event
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No issue number found, skipping cleanup"
            exit 0
          fi

          echo "Cleaning up labels for issue #$ISSUE_NUMBER"

          # Remove claude label (frees up queue)
          gh issue edit "$ISSUE_NUMBER" --remove-label claude 2>/dev/null || true

          # Add completed label if job succeeded
          if [ "${{ job.status }}" == "success" ]; then
            gh issue edit "$ISSUE_NUMBER" --add-label completed 2>/dev/null || true
          else
            # Re-add planned label if failed (can retry)
            gh issue edit "$ISSUE_NUMBER" --add-label planned 2>/dev/null || true
          fi
