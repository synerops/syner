name: Vercel React Best Practices

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Create branch
        id: branch
        run: |
          BRANCH="syner/react-best-practices-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Install skill globally
        run: npx -y skills add vercel-labs/agent-skills --skill vercel-react-best-practices --global -y

      # ── Shot 1: Claude applies best practices ──
      - name: "Shot 1: Apply best practices"
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You have the vercel-react-best-practices skill installed globally in ~/.claude/skills/.
            Read it to understand all React/Next.js rules.

            Scan these files: apps/**/*.tsx packages/ui/**/*.tsx

            For each file:
            1. Read the file
            2. Check against the skill's rules
            3. Apply fixes directly (edit the file)

            Focus on: React 19 patterns, Next.js App Router best practices,
            component composition, proper use of 'use client', performance.

            After all fixes, commit with message "fix(react): apply vercel best practices".
          claude_args: |
            --max-turns 50
            --allowedTools Read,Write,Edit,Glob,Bash

      # ── Verification 1 ──
      - name: "Verify 1: Typecheck"
        id: verify1
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee lint-output.txt
        continue-on-error: true

      # ── Shot 2: Fix remaining errors (last chance) ──
      - name: "Shot 2: Fix typecheck errors"
        if: steps.verify1.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The typecheck/lint failed after applying React best practices.
            Here are the errors:

            ```
            $(cat lint-output.txt)
            ```

            Fix ALL these errors. This is your last chance — if they persist, an issue
            will be created instead of a PR.

            Read the failing files, understand the errors, and fix them.
            Commit with message "fix(react): resolve typecheck errors".
          claude_args: |
            --max-turns 30
            --allowedTools Read,Write,Edit,Glob,Bash

      # ── Verification 2 ──
      - name: "Verify 2: Typecheck"
        id: verify2
        if: steps.verify1.outcome == 'failure'
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee lint-output-2.txt
        continue-on-error: true

      # ── Push whatever we have ──
      - name: Push changes
        run: |
          git add -A
          git commit -m "fix(react): apply vercel best practices" || true
          git push -u origin ${{ steps.branch.outputs.name }}

      # ── PR if verification passed ──
      - name: Create PR
        if: steps.verify1.outcome == 'success' || steps.verify2.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet HEAD origin/main; then
            echo "No changes to PR"
            exit 0
          fi

          CHANGED=$(git diff --name-only origin/main | head -30)
          SHOT="1"
          if [ "${{ steps.verify2.outcome }}" = "success" ]; then
            SHOT="2"
          fi

          gh label create "autofix" --color "0e8a16" 2>/dev/null || true

          gh pr create \
            --title "fix(react): apply vercel best practices" \
            --label "autofix" \
            --head "${{ steps.branch.outputs.name }}" \
            --body "$(cat <<EOF
          ## Summary

          Automated review using [vercel-react-best-practices](https://skills.sh/vercel-labs/agent-skills/vercel-react-best-practices) skill.

          Scanned all TSX files in \`apps/\` and \`packages/ui/\`.

          - Typecheck: **passed** (shot ${SHOT})
          - Branch: \`${{ steps.branch.outputs.name }}\`

          ### Files changed

          \`\`\`
          ${CHANGED}
          \`\`\`

          ---
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Generated by [@synerbot](https://github.com/apps/synerbot)
          EOF
          )"

      # ── Issue if both shots failed ──
      - name: Create issue
        if: steps.verify1.outcome == 'failure' && steps.verify2.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CHANGED=$(git diff --name-only origin/main || true)
          ERRORS=$(cat lint-output-2.txt 2>/dev/null || cat lint-output.txt)

          gh label create "bug" --color "d73a4a" 2>/dev/null || true

          gh issue create \
            --title "fix(react): typecheck errors after best practices" \
            --label "bug" \
            --assignee "${{ github.repository_owner }}" \
            --body "$(cat <<EOF
          ## Context

          The [vercel-react-best-practices](https://skills.sh/vercel-labs/agent-skills/vercel-react-best-practices) workflow ran two shots and typecheck still fails.

          **Branch:** \`${{ steps.branch.outputs.name }}\`
          This branch has all changes applied — use it as your starting point.

          ## Typecheck errors (after shot 2)

          \`\`\`
          ${ERRORS}
          \`\`\`

          ## Files modified

          \`\`\`
          ${CHANGED}
          \`\`\`

          ## What was tried

          1. **Shot 1:** Applied vercel-react-best-practices skill to all TSX files
          2. **Verify 1:** Typecheck failed
          3. **Shot 2:** Fed errors back to Claude for targeted fixes
          4. **Verify 2:** Typecheck still failed

          ## Next steps

          - Checkout branch \`${{ steps.branch.outputs.name }}\` — all changes are there
          - The errors above are the remaining issues to fix manually
          - Once fixed, create a PR from that branch

          ---
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Generated by [@synerbot](https://github.com/apps/synerbot)
          EOF
          )"
