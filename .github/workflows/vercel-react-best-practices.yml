name: Vercel React Best Practices

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1-5'  # 9am EST (UTC-5), weekdays

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Install skill globally
        run: npx -y skills add vercel-labs/agent-skills --skill vercel-react-best-practices --global -y

      # ── One shot: Claude scans, fixes, commits, pushes, creates PR ──
      - name: "Apply best practices"
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You have the vercel-react-best-practices skill installed globally in ~/.claude/skills/.
            Read it to understand all React/Next.js rules.

            ## Task

            Scan all TSX files: apps/**/*.tsx packages/ui/**/*.tsx

            For each file:
            1. Read it
            2. Check against the skill's rules
            3. If there are real violations, fix them

            ## Constraints

            - Only fix REAL violations. Don't change code that's already correct.
            - Don't add imports for things that don't exist in the project.
            - Don't change component behavior, only optimize.
            - If a fix requires changing public API (exports maps, package.json), skip it and note why.
            - If unsure, skip it. Conservative fixes only.

            ## Verification

            After applying fixes, run: bun run lint
            If lint fails, fix the errors and run lint again. You get two attempts.

            ## Delivery

            If you made changes and lint passes:
            1. Create a branch: git checkout -b syner/react-best-practices-$(date +%s)
            2. Commit: git add -A && git commit -m "fix(react): apply vercel best practices"
            3. Push: git push -u origin HEAD
            4. Create a PR using gh (token is available as GH_TOKEN):
               gh pr create \
                 --title "fix(react): apply vercel best practices" \
                 --label "autofix" \
                 --body "Automated review using vercel-react-best-practices skill. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            If you made changes but lint still fails after two attempts, create an issue:
               gh issue create \
                 --title "fix(react): typecheck errors after best practices" \
                 --label "bug" \
                 --assignee "${{ github.repository_owner }}" \
                 --body "The vercel-react-best-practices workflow applied fixes but typecheck still fails. Branch has all changes. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            If no violations found, do nothing.
          claude_args: |
            --max-turns 50
            --allowedTools Read,Write,Edit,Glob,Bash,Grep
          env: |
            GH_TOKEN=${{ steps.app-token.outputs.token }}
