name: Vercel React Best Practices

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 9am UTC
  pull_request:
    paths:
      - '**/*.tsx'

jobs:
  review-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Create branch
        if: github.event_name != 'pull_request'
        run: |
          BRANCH="syner/react-best-practices-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

      - name: Install skill globally
        run: npx -y skills add vercel-labs/agent-skills --skill vercel-react-best-practices --global -y

      - name: Determine scope
        id: scope
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(gh pr diff ${{ github.event.number }} --name-only | grep '\.tsx$' || true)
            if [ -z "$FILES" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "target=$FILES" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "target=apps/**/*.tsx packages/ui/**/*.tsx" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code
        if: steps.scope.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You have the vercel-react-best-practices skill installed globally in ~/.claude/skills/.
            Read it to understand all React/Next.js rules.

            Scan these files: ${{ steps.scope.outputs.target }}

            For each file:
            1. Read the file
            2. Check against the skill's rules
            3. Apply fixes directly (edit the file)

            Focus on: React 19 patterns, Next.js App Router best practices,
            component composition, proper use of 'use client', performance.

            After all fixes, commit with message "fix(react): apply vercel best practices".
          claude_args: |
            --max-turns 50
            --allowedTools Read,Write,Edit,Glob,Bash

      - name: Push changes
        if: steps.scope.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "fix(react): apply vercel best practices" || true
            git push
          fi

      - name: Create PR
        if: github.event_name != 'pull_request' && steps.scope.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet HEAD origin/main; then
            echo "No changes to PR"
            exit 0
          fi

          gh label create "react-best-practices" --color "61dafb" 2>/dev/null || true
          gh pr create \
            --title "fix(react): apply vercel best practices" \
            --label "react-best-practices" \
            --body "$(cat <<'EOF'
          Automated review using [vercel-react-best-practices](https://skills.sh/vercel-labs/agent-skills/vercel-react-best-practices) skill.

          Scanned all TSX files in `apps/` and `packages/ui/`.

          ---
          Generated by [@synerbot](https://github.com/apps/synerbot)
          EOF
          )"
