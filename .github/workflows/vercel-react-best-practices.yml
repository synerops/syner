name: Vercel React Best Practices

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1-5'  # 9am EST (UTC-5), weekdays

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      branch_name: ${{ steps.branch.outputs.name }}
      verification: ${{ steps.result.outputs.status }}
      shot: ${{ steps.result.outputs.shot }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Configure git with App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "synerbot[bot]"
          git config user.email "synerbot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Create branch
        id: branch
        run: |
          BRANCH="syner/react-best-practices-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Install skill globally
        run: npx -y skills add vercel-labs/agent-skills --skill vercel-react-best-practices --global -y

      # ── Shot 1: Claude applies best practices ──
      - name: "Shot 1: Apply best practices"
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You have the vercel-react-best-practices skill installed globally in ~/.claude/skills/.
            Read it to understand all React/Next.js rules.

            Scan these files: apps/**/*.tsx packages/ui/**/*.tsx

            For each file:
            1. Read the file
            2. Check against the skill's rules
            3. Apply fixes directly (edit the file)

            Focus on: React 19 patterns, Next.js App Router best practices,
            component composition, proper use of 'use client', performance.

            After all fixes, commit with message "fix(react): apply vercel best practices".
          claude_args: |
            --max-turns 50
            --allowedTools Read,Write,Edit,Glob,Bash

      # ── Verification 1 ──
      - name: "Verify 1: Typecheck"
        id: verify1
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee /tmp/lint-output.txt
        continue-on-error: true

      # ── Shot 2: Fix remaining errors (last chance) ──
      - name: "Shot 2: Fix typecheck errors"
        if: steps.verify1.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The typecheck/lint failed after applying React best practices.
            Here are the errors:

            ```
            $(cat /tmp/lint-output.txt)
            ```

            Fix ALL these errors. This is your last chance — if they persist, an issue
            will be created instead of a PR.

            Read the failing files, understand the errors, and fix them.
            Commit with message "fix(react): resolve typecheck errors".
          claude_args: |
            --max-turns 30
            --allowedTools Read,Write,Edit,Glob,Bash

      # ── Verification 2 ──
      - name: "Verify 2: Typecheck"
        id: verify2
        if: steps.verify1.outcome == 'failure'
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee /tmp/lint-output-2.txt
        continue-on-error: true

      # ── Determine result ──
      - name: Determine result
        id: result
        run: |
          if [ "${{ steps.verify1.outcome }}" = "success" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "shot=1" >> $GITHUB_OUTPUT
          elif [ "${{ steps.verify2.outcome }}" = "success" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "shot=2" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "shot=2" >> $GITHUB_OUTPUT
          fi

      # ── Push if there are changes ──
      - name: Push branch
        run: |
          if ! git diff --quiet HEAD origin/main; then
            git push -u origin ${{ steps.branch.outputs.name }}
          else
            echo "No changes to push"
          fi

      # ── Upload lint errors for issue job ──
      - name: Upload lint output
        if: steps.result.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: /tmp/lint-output*.txt
          retention-days: 7

  pr:
    needs: fix
    if: needs.fix.outputs.verification == 'passed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ needs.fix.outputs.branch_name }}"

          if ! git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH not found on remote (no changes were pushed)"
            exit 0
          fi

          CHANGED=$(git diff --name-only origin/main "origin/$BRANCH" | head -30)

          gh label create "autofix" --color "0e8a16" 2>/dev/null || true

          gh pr create \
            --title "fix(react): apply vercel best practices" \
            --label "autofix" \
            --head "$BRANCH" \
            --body "$(cat <<EOF
          ## Summary

          Automated review using [vercel-react-best-practices](https://skills.sh/vercel-labs/agent-skills/vercel-react-best-practices) skill.

          Scanned all TSX files in \`apps/\` and \`packages/ui/\`.

          - Typecheck: **passed** (shot ${{ needs.fix.outputs.shot }})
          - Branch: \`$BRANCH\`

          ### Files changed

          \`\`\`
          ${CHANGED}
          \`\`\`

          ---
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Generated by [@synerbot](https://github.com/apps/synerbot)
          EOF
          )"

  issue:
    needs: fix
    if: needs.fix.outputs.verification == 'failed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Download lint output
        uses: actions/download-artifact@v4
        with:
          name: lint-output
          path: /tmp

      - name: Create issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ needs.fix.outputs.branch_name }}"
          CHANGED=$(git diff --name-only origin/main "origin/$BRANCH" || true)
          ERRORS=$(cat /tmp/lint-output-2.txt 2>/dev/null || cat /tmp/lint-output.txt)

          gh label create "bug" --color "d73a4a" 2>/dev/null || true

          gh issue create \
            --title "fix(react): typecheck errors after best practices" \
            --label "bug" \
            --assignee "${{ github.repository_owner }}" \
            --body "$(cat <<EOF
          ## Context

          The [vercel-react-best-practices](https://skills.sh/vercel-labs/agent-skills/vercel-react-best-practices) workflow ran two shots and typecheck still fails.

          **Branch:** \`$BRANCH\`
          This branch has all changes applied — use it as your starting point.

          ## Typecheck errors (after shot 2)

          \`\`\`
          ${ERRORS}
          \`\`\`

          ## Files modified

          \`\`\`
          ${CHANGED}
          \`\`\`

          ## What was tried

          1. **Shot 1:** Applied vercel-react-best-practices skill to all TSX files
          2. **Verify 1:** Typecheck failed
          3. **Shot 2:** Fed errors back to Claude for targeted fixes
          4. **Verify 2:** Typecheck still failed

          ## Next steps

          - Checkout branch \`$BRANCH\` — all changes are there
          - The errors above are the remaining issues to fix manually
          - Once fixed, create a PR from that branch

          ---
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Generated by [@synerbot](https://github.com/apps/synerbot)
          EOF
          )"
