name: Daily Standup

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 9am EST (UTC-5)
  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather GitHub data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .syner/context/daily-standup
          date +%Y-%m-%d > .syner/context/daily-standup/today.txt
          gh issue list --assignee @me --state open --json number,title,updatedAt,labels > .syner/context/daily-standup/issues-open.json
          gh pr list --author @me --state open --json number,title,createdAt > .syner/context/daily-standup/prs-open.json
          gh pr list --search "review-requested:@me" --json number,title,author,createdAt > .syner/context/daily-standup/prs-review.json
          gh issue list --assignee @me --state closed --json number,title,closedAt --limit 20 > .syner/context/daily-standup/issues-closed.json
          gh pr list --author @me --state merged --json number,title,mergedAt --limit 20 > .syner/context/daily-standup/prs-merged.json
          mkdir -p reports

      - name: Generate standup report
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/syner-daily-standup"
          claude_args: |
            --agent syner
            --max-turns 10

      - name: Create issue from report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          REPORT="reports/standup-${TODAY}.md"
          TITLE="🌅 Standup ${TODAY}"

          if [ ! -f "$REPORT" ]; then
            echo "No report found at $REPORT, skipping"
            exit 0
          fi

          # Check if issue already exists
          EXISTING=$(gh issue list --label standup --search "$TITLE" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists, updating body"
            gh issue edit "$EXISTING" --body-file "$REPORT"
          else
            gh issue create --title "$TITLE" --body-file "$REPORT" --label "standup"
          fi
