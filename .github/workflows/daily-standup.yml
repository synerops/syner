name: Daily Standup

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 9am EST (UTC-5)
  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SYNERBOT_APP_ID }}
          private-key: ${{ secrets.SYNERBOT_APP_PRIVATE_KEY }}

      - name: Gather GitHub data
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p .syner/context/daily-standup
          date +%Y-%m-%d > .syner/context/daily-standup/today.txt
          gh issue list --state open --json number,title,updatedAt,labels,assignees > .syner/context/daily-standup/issues-open.json
          gh pr list --state open --json number,title,createdAt,author > .syner/context/daily-standup/prs-open.json
          gh pr list --search "review:required" --json number,title,author,createdAt > .syner/context/daily-standup/prs-review.json
          gh issue list --state closed --json number,title,closedAt --limit 20 > .syner/context/daily-standup/issues-closed.json
          gh pr list --state merged --json number,title,mergedAt,author --limit 20 > .syner/context/daily-standup/prs-merged.json
          mkdir -p reports

      - name: Generate standup report
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read .syner/context/daily-standup/ files and write reports/standup-{date}.md

            ## Format
            # Standup YYYY-MM-DD
            ## Yesterday
            - [Completed: closed issues, merged PRs]
            ## Today
            - [Open issues/PRs, reviews needed]
            ## Blockers
            - [Any blockers, or "None"]

            ## @claude (ONLY if action needed)
            Include this section ONLY if there are:
            - Stale items (>7 days without activity)
            - PRs waiting review >2 days
            - Blockers that need investigation

            Format: "→ [specific actionable instruction for Claude]"
            Example: "→ Investigate why PR #123 is stale and comment with findings"
            Omit this section entirely if all is clear.

            ## Analysis rules
            1. **Stale**: Flag items >7 days. Check if stale PR blocks stale issue.
            2. **Velocity**: If open items > recently merged, note "accumulating backlog".
            3. **Reviews**: Flag PRs waiting review >2 days as bottleneck.
            4. **Fragmentation**: If items span 4+ different areas (from titles), warn about context switching.

            ## Other rules
            - Skip items with labels: blocked, waiting-external
            - Max 20 lines. If nothing notable: "✅ All clear"
          claude_args: |
            --max-turns 10
            --allowedTools Read,Write,Glob

      - name: Create issue from report
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          REPORT="reports/standup-${TODAY}.md"
          TITLE="Standup ${TODAY}"

          if [ ! -f "$REPORT" ]; then
            echo "No report found at $REPORT, skipping"
            exit 0
          fi

          # Ensure labels exist
          gh label create "standup" --description "Daily standup report" --color "0e8a16" 2>/dev/null || true
          gh label create "needs-planning" --description "Needs planning before execution" --color "d4a017" 2>/dev/null || true
          gh label create "claude" --description "Ready for Claude execution" --color "7c3aed" 2>/dev/null || true

          # Check if report needs action
          if grep -q "## @claude" "$REPORT"; then
            NEEDS_ACTION=true
          else
            NEEDS_ACTION=false
          fi

          # Check if issue already exists
          EXISTING=$(gh issue list --label standup --search "$TITLE in:title" --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists, updating"
            gh issue edit "$EXISTING" --body-file "$REPORT"

            # Update labels based on content
            gh issue edit "$EXISTING" --remove-label "needs-planning" 2>/dev/null || true
            gh issue edit "$EXISTING" --remove-label "claude" 2>/dev/null || true

            if [ "$NEEDS_ACTION" = "true" ]; then
              # Check if already has a plan
              HAS_PLAN=$(gh issue view "$EXISTING" --json body --jq '.body' | grep -c "## Plan" || true)
              if [ "$HAS_PLAN" -gt 0 ]; then
                echo "Issue has plan, adding claude label..."
                gh issue edit "$EXISTING" --add-label "claude"
              else
                echo "Issue needs planning..."
                gh issue edit "$EXISTING" --add-label "needs-planning"
              fi
            fi
          else
            if [ "$NEEDS_ACTION" = "true" ]; then
              echo "Creating issue with needs-planning label..."
              gh issue create --title "$TITLE" --body-file "$REPORT" --label "standup" --label "needs-planning"
            else
              echo "Creating informational standup issue..."
              gh issue create --title "$TITLE" --body-file "$REPORT" --label "standup"
            fi
          fi
