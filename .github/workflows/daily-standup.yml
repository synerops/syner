name: Daily Standup

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 9am EST (UTC-5)
  workflow_dispatch:

jobs:
  standup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather GitHub data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .syner/context/daily-standup
          date +%Y-%m-%d > .syner/context/daily-standup/today.txt
          gh issue list --assignee @me --state open --json number,title,updatedAt,labels > .syner/context/daily-standup/issues-open.json
          gh pr list --author @me --state open --json number,title,createdAt > .syner/context/daily-standup/prs-open.json
          gh pr list --search "review-requested:@me" --json number,title,author,createdAt > .syner/context/daily-standup/prs-review.json
          gh issue list --assignee @me --state closed --json number,title,closedAt --limit 20 > .syner/context/daily-standup/issues-closed.json
          gh pr list --author @me --state merged --json number,title,mergedAt --limit 20 > .syner/context/daily-standup/prs-merged.json
          mkdir -p reports

      - name: Generate standup report
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read .syner/context/daily-standup/ files and write reports/standup-{date}.md

            ## Format
            # Standup YYYY-MM-DD
            ## Yesterday
            - [Completed: closed issues, merged PRs]
            ## Today
            - [Open issues/PRs, reviews needed]
            ## Blockers
            - [Any blockers, or "None"]
            ## Alerts
            - [Only if issues found, otherwise omit section]

            ## Analysis rules
            1. **Stale**: Flag items >7 days. Check if stale PR blocks stale issue.
            2. **Velocity**: If open items > recently merged, note "accumulating backlog".
            3. **Reviews**: Flag PRs waiting review >2 days as bottleneck.
            4. **Fragmentation**: If items span 4+ different areas (from titles), warn about context switching.

            ## Other rules
            - Skip items with labels: blocked, waiting-external
            - Max 20 lines. If nothing notable: "✅ All clear"
          claude_args: |
            --max-turns 10
            --allowedTools Read,Write,Glob

      - name: Create issue from report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          REPORT="reports/standup-${TODAY}.md"
          TITLE="🌅 Standup ${TODAY}"

          if [ ! -f "$REPORT" ]; then
            echo "No report found at $REPORT, skipping"
            exit 0
          fi

          # Check if issue already exists
          EXISTING=$(gh issue list --label standup --search "$TITLE" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists, updating body"
            gh issue edit "$EXISTING" --body-file "$REPORT"
          else
            gh issue create --title "$TITLE" --body-file "$REPORT" --label "standup"
          fi
